# CustomerAI Model Provider Configuration
# Version: 1.0.0

# Default provider to use
default: "openai"

# Provider configurations
providers:
  # OpenAI Configuration
  openai:
    api_key_env: "OPENAI_API_KEY"
    models:
      default: "gpt-4"
      chat:
        default: "gpt-4"
        options:
          - name: "gpt-4"
            max_tokens: 8192
            temperature: 0.2
            description: "Most capable GPT-4 model for complex tasks"
          - name: "gpt-4-turbo"
            max_tokens: 4096
            temperature: 0.2
            description: "Faster version of GPT-4 for most tasks"
          - name: "gpt-3.5-turbo"
            max_tokens: 4096
            temperature: 0.2
            description: "Good balance of capability and cost"
      embedding:
        default: "text-embedding-ada-002"
        options:
          - name: "text-embedding-ada-002"
            dimension: 1536
            description: "Standard embedding model"
    timeout: 30
    retry_count: 3
    batch_size: 20
    rate_limit_rpm: 3500
    cost_per_1k_tokens:
      input:
        gpt-4: 0.03
        gpt-4-turbo: 0.01
        gpt-3.5-turbo: 0.0015
      output:
        gpt-4: 0.06
        gpt-4-turbo: 0.03
        gpt-3.5-turbo: 0.002

  # Anthropic Configuration
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
    models:
      default: "claude-3-opus-20240229"
      chat:
        default: "claude-3-opus-20240229"
        options:
          - name: "claude-3-opus-20240229"
            max_tokens: 4096
            temperature: 0.2
            description: "Most capable Claude model"
          - name: "claude-3-sonnet-20240229"
            max_tokens: 4096
            temperature: 0.2
            description: "Good balance of capability and cost"
          - name: "claude-3-haiku-20240307"
            max_tokens: 4096
            temperature: 0.2
            description: "Fastest and most cost-effective Claude model"
    timeout: 30
    retry_count: 3
    batch_size: 20
    rate_limit_rpm: 2000
    cost_per_1k_tokens:
      input:
        claude-3-opus-20240229: 0.015
        claude-3-sonnet-20240229: 0.003
        claude-3-haiku-20240307: 0.00025
      output:
        claude-3-opus-20240229: 0.075
        claude-3-sonnet-20240229: 0.015
        claude-3-haiku-20240307: 0.00125

  # Google Gemini Configuration
  gemini:
    api_key_env: "GOOGLE_API_KEY"
    models:
      default: "gemini-pro"
      chat:
        default: "gemini-pro"
        options:
          - name: "gemini-pro"
            max_tokens: 8192
            temperature: 0.2
            description: "Balanced model for most tasks"
          - name: "gemini-ultra"
            max_tokens: 8192
            temperature: 0.2
            description: "Most capable Gemini model"
      embedding:
        default: "embedding-001"
        options:
          - name: "embedding-001"
            dimension: 768
            description: "Standard embedding model"
    timeout: 30
    retry_count: 3
    batch_size: 20
    rate_limit_rpm: 3000
    cost_per_1k_tokens:
      input:
        gemini-pro: 0.00125
        gemini-ultra: 0.00375
      output:
        gemini-pro: 0.00375
        gemini-ultra: 0.01125

  # Azure OpenAI Configuration
  azure_openai:
    api_key_env: "AZURE_OPENAI_API_KEY"
    endpoint_env: "AZURE_OPENAI_ENDPOINT"
    models:
      default: "gpt-4"
      chat:
        default: "gpt-4"
        options:
          - name: "gpt-4"
            deployment_name: "gpt-4"
            max_tokens: 8192
            temperature: 0.2
            description: "Most capable GPT-4 model for complex tasks"
          - name: "gpt-35-turbo"
            deployment_name: "gpt-35-turbo"
            max_tokens: 4096
            temperature: 0.2
            description: "Good balance of capability and cost"
      embedding:
        default: "text-embedding-ada-002"
        options:
          - name: "text-embedding-ada-002"
            deployment_name: "text-embedding-ada-002"
            dimension: 1536
            description: "Standard embedding model"
    timeout: 30
    retry_count: 3
    batch_size: 20
    rate_limit_rpm: 3500
    cost_per_1k_tokens:
      input:
        gpt-4: 0.03
        gpt-35-turbo: 0.0015
      output:
        gpt-4: 0.06
        gpt-35-turbo: 0.002

  # Local Model Configuration (for fallback)
  local_model:
    models:
      default: "ggml-model"
      chat:
        default: "ggml-model"
        options:
          - name: "ggml-model"
            path: "models/ggml-model-q4_0.bin"
            max_tokens: 2048
            temperature: 0.2
            description: "Local fallback model"
      embedding:
        default: "local-embedding"
        options:
          - name: "local-embedding"
            path: "models/local-embedding.bin"
            dimension: 768
            description: "Local embedding model"
    timeout: 60
    batch_size: 1
    cost_per_1k_tokens:
      input:
        ggml-model: 0.0
      output:
        ggml-model: 0.0

# Provider selection criteria
selection_criteria:
  latency: "lowest"
  compliance: "GDPR/SOC2"
  cost_efficiency: "max_tokens_per_dollar"

# Fallback priority
fallback_priority:
  - "local_model"
  - "openai"
  - "anthropic"

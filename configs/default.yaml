# CustomerAI Default Configuration
# Version: 1.0.0

# API Server Configuration
api:
  host: "0.0.0.0"
  port: 8000
  debug: false
  cors_origins:
    - "*"
  rate_limiting: true
  input_sanitization: true

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_enabled: true
  log_dir: "logs"
  max_bytes: 10485760  # 10 MB
  backup_count: 5

# Safety Measures
safety:
  anti_hallucination: true
  source_verification: true
  bias_filter: true
  fallback_message: "I do not have enough data to answer accurately."
  sentiment_neutrality_check: true
  sensitive_topic_filtering: true
  bias_metrics_audit: true
  demographic_performance_logs: true

# Memory Configuration
memory:
  type: "mock"  # Options: mock, short_term, long_term
  vector_db:
    type: "faiss"  # Options: mock, faiss, pinecone
    dimension: 1536
    index_path: "data/vector_index"
    similarity_threshold: 0.7

# Knowledge Base Configuration
knowledge:
  type: "vector_store"  # Options: mock, vector_store, graph
  sources: []
  vector_store:
    type: "faiss"  # Options: mock, faiss, pinecone
    dimension: 1536
    index_path: "data/knowledge_index"
  graph_db:
    type: "mock"  # Options: mock, neo4j
    uri: "bolt://localhost:7687"
    username: "neo4j"
    password: "password"

# Action Executor Configuration
actions:
  mode: "mock"  # Options: mock, live
  plugins:
    zendesk:
      api_key_env: "ZENDESK_API_KEY"
      subdomain: "customerai"
    email:
      smtp_server: "smtp.example.com"
      smtp_port: 587
      username_env: "EMAIL_USERNAME"
      password_env: "EMAIL_PASSWORD"
      from_address: "customerai@example.com"
    webhook:
      timeout: 5
      retry_count: 3

# Model Provider Configuration
model_providers:
  default: "openai"
  openai:
    api_key_env: "OPENAI_API_KEY"
    model: "gpt-4"
    temperature: 0.2
    max_tokens: 1000
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
    model: "claude-3-opus-20240229"
    temperature: 0.2
    max_tokens: 1000
  gemini:
    api_key_env: "GOOGLE_API_KEY"
    model: "gemini-pro"
    temperature: 0.2
    max_tokens: 1000
  azure_openai:
    api_key_env: "AZURE_OPENAI_API_KEY"
    endpoint_env: "AZURE_OPENAI_ENDPOINT"
    deployment_name: "gpt-4"
    temperature: 0.2
    max_tokens: 1000

# Mode Configuration
mode:
  type: "mock"  # Options: mock, production
  production_ready: false

# Security Configuration
security:
  data_encryption:
    in_transit: "TLS1.2+"
    at_rest: "AES-256"
  rate_limiting: true
  input_sanitization: true
  api_key_rotation: true
  zero_trust_policy: true
  logging_and_alerting:
    intrusion_detection: true
    anomaly_alerting: true
  advanced_threat_detection: true
  data_anonymization: true
  multi_factor_authentication: true

# Reliability Metrics
reliability_metrics:
  hallucination_rate_target: "<2%"
  bias_incident_rate: "<1 per 10,000 interactions"
  source_verification_success_rate: ">98%"
  response_latency_ms: "<500ms for 95% of requests"

# Service Level Agreements
service_level_agreements:
  uptime: "99.9%"
  response_time_ms: "500ms P95"
  data_processing_lag: "<5 seconds"
  fallback_response_rate: "<5%"

hsm:
  # Key Management Settings
  key_rotation_days: 90
  key_sizes:
    RSA: 4096
    ECDSA: 384
    AES: 256
  
  # Supported Algorithms
  crypto_algorithms:
    signing:
      - RSA-PSS
      - ECDSA
    encryption:
      - AES-256-GCM
      - RSA-OAEP
    hashing:
      - SHA-384
      - SHA-512
  
  # Security Parameters
  security:
    key_storage: HSM
    key_protection: hardware
    key_access_policy: strict
    audit_trail: enabled
  
  # Performance Settings
  performance:
    cache_size: 1000
    cache_ttl: 3600
    max_operations: 10000
  
  # Compliance Settings
  compliance:
    fips_mode: enabled
    nist_compliance: enabled
    audit_retention: 365
  
  # Monitoring Settings
  monitoring:
    enabled: true
    metrics_interval: 60
    alert_thresholds:
      key_operations: 1000
      failed_operations: 5
      performance_degradation: 20
  
  # Backup Settings
  backup:
    enabled: true
    frequency: daily
    retention_days: 365
    encryption: enabled
